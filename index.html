<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakım HUB | Aktif Takip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-[#0f172a] text-slate-100">

    <nav class="border-b border-slate-800 bg-[#1e293b]/90 backdrop-blur sticky top-0 z-50 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="material-icons text-blue-400">precision_manufacturing</span>
                <span class="font-bold text-xl tracking-tight">HUB<span class="text-blue-500 font-black">.SYSTEM</span></span>
            </div>
            <div id="status-badge" class="flex items-center gap-2 bg-slate-900/50 px-3 py-1.5 rounded-full border border-slate-700">
                <span id="status-dot" class="h-2 w-2 rounded-full bg-green-500"></span>
                <span id="status-text" class="text-[9px] font-black uppercase tracking-widest text-slate-400">Bağlı</span>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 py-8">
        <div id="data-list" class="grid gap-4">
            <div class="text-center py-20 text-slate-500">
                <div class="animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full inline-block mb-4"></div>
                <p class="text-xs font-bold tracking-widest">VERİLER TARANIYOR...</p>
            </div>
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSiAuiO1cWDZLOtuFdAkBOU1PNf5mpThgH3yKaL5NHpj0QDrJmpt7XbRuCnQejkxf89oQ_uu1zO-2/pub?gid=0&single=true&output=csv';
        
        function updateStatus(type) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            if(type === 'loading') { dot.className = "h-2 w-2 rounded-full bg-yellow-500"; text.innerText = "Güncelleniyor"; }
            if(type === 'success') { dot.className = "h-2 w-2 rounded-full bg-green-500"; text.innerText = "Bağlı"; }
            if(type === 'error') { dot.className = "h-2 w-2 rounded-full bg-red-500"; text.innerText = "Hata"; }
        }

        function fetchData() {
            updateStatus('loading');
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if(results.data && results.data.length > 0) {
                        processActiveData(results.data);
                        updateStatus('success');
                    }
                },
                error: function() { updateStatus('error'); }
            });
        }

        function processActiveData(data) {
            const list = document.getElementById('data-list');
            list.innerHTML = "";

            // AKTİF İŞLERİ FİLTRELE: "BAKIMI YAPAN-1" sütunu boş olanları göster
            const activeTasks = data.filter(item => {
                const bYapan = item["BAKIMI YAPAN-1"] || "";
                const mAdi = item["MAKİNE ADI"] || "";
                // Makine adı dolu ama bakımı yapan henüz girilmemişse aktiftir
                return mAdi.trim() !== "" && bYapan.trim() === "";
            });

            if (activeTasks.length === 0) {
                list.innerHTML = `<div class="py-20 text-center opacity-40"><p class="text-sm font-bold tracking-widest uppercase">Aktif Arıza Bulunmuyor</p></div>`;
                return;
            }

            activeTasks.reverse().forEach(item => {
                const makine = item["MAKİNE ADI"];
                const bolum = item["BÖLÜM"] || "-";
                const tur = item["ARIZA TÜRÜ"] || "Genel";
                const aciklama = item["ARIZA AÇIKLAMA"] || "Detay yok";
                const tarih = item["TARİH"] || "";

                const isCritical = tur.toLowerCase().includes("elektrik") || tur.toLowerCase().includes("mekanik");

                list.innerHTML += `
                    <div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700/50 flex justify-between items-center shadow-xl border-l-4 ${isCritical ? 'border-l-red-500' : 'border-l-blue-500'}">
                        <div class="flex-1 pr-4">
                            <div class="flex items-center gap-2 mb-2">
                                <h3 class="font-black text-white tracking-tight">${makine}</h3>
                                <span class="text-[8px] bg-slate-700 px-1.5 py-0.5 rounded font-bold uppercase">${bolum}</span>
                            </div>
                            <p class="text-[11px] text-slate-400 font-medium leading-relaxed">${aciklama}</p>
                            <p class="text-[9px] text-slate-600 mt-3 font-mono">${tarih}</p>
                        </div>
                        <div class="text-right">
                            <span class="px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest border ${isCritical ? 'bg-red-500/10 text-red-500 border-red-500/20' : 'bg-blue-500/10 text-blue-400 border-blue-500/20'}">
                                ${tur}
                            </span>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = fetchData;
        setInterval(fetchData, 20000);
    </script>
</body>
</html>
