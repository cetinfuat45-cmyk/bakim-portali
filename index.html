<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB.CORE | Kesintisiz İzleme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 selection:bg-blue-500">

    <nav class="border-b border-slate-800 bg-slate-900/95 backdrop-blur sticky top-0 z-50 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="material-icons text-blue-500">dashboard</span>
                <span class="font-bold text-xl tracking-tighter uppercase">BAKIM<span class="text-blue-500 font-black italic">HUB</span></span>
            </div>
            <div id="connection-status" class="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 transition-all">
                <span id="dot" class="h-2 w-2 rounded-full bg-green-500"></span>
                <span id="text" class="text-[9px] font-black uppercase tracking-widest text-slate-400 font-mono">BAĞLI</span>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 py-8">
        <div id="data-list" class="grid gap-4">
            <div class="text-center py-20">
                <div class="inline-block animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Sistem Senkronize Ediliyor...</p>
            </div>
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSiAuiO1cWDZLOtuFdAkBOU1PNf5mpThgH3yKaL5NHpj0QDrJmpt7XbRuCnQejkxf89oQ_uu1zO-2/pub?gid=0&single=true&output=csv';
        
        let lastKnownGoodData = null; // Hafıza birimi

        function fetchData() {
            const dot = document.getElementById('dot');
            const text = document.getElementById('text');
            
            // Güncelleme başladığında uyarı ver
            dot.className = "h-2 w-2 rounded-full bg-yellow-500 animate-pulse";
            text.innerText = "GÜNCELLENİYOR";

            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    // Eğer veri gerçekten dolu geldiyse işle
                    if (results.data && results.data.length > 0 && results.data[0]["MAKİNE ADI"]) {
                        lastKnownGoodData = results.data;
                        updateUI(results.data);
                        
                        dot.className = "h-2 w-2 rounded-full bg-green-500";
                        text.innerText = "BAĞLI";
                    } else {
                        // Veri boş geldiyse eskiyi koru
                        keepLastData("Boş Veri Hatası");
                    }
                },
                error: function() {
                    keepLastData("Bağlantı Hatası");
                }
            });
        }

        function keepLastData(errorType) {
            const dot = document.getElementById('dot');
            const text = document.getElementById('text');
            dot.className = "h-2 w-2 rounded-full bg-red-500";
            text.innerText = errorType;
            
            if (lastKnownGoodData) {
                updateUI(lastKnownGoodData);
            }
        }

        function updateUI(data) {
            const container = document.getElementById('data-list');
            container.innerHTML = "";
            
            // Ters sıralama (en yeni üstte)
            const sortedData = [...data].reverse();

            sortedData.forEach(item => {
                const makine = item["MAKİNE ADI"];
                const bolum = item["BÖLÜM"] || "Genel";
                const durum = item["ARIZA TÜRÜ"] || "Belirsiz";
                const aciklama = item["ARIZA AÇIKLAMA"] || "Detay yok";
                const personel = item["BAKIMI YAPAN-1"] || "-";

                if (!makine || makine.trim() === "") return;

                const isCritical = durum.toLowerCase().includes("arıza") || durum.toLowerCase().includes("elektrik") || durum.toLowerCase().includes("mekanik");

                container.innerHTML += `
                    <div class="bg-slate-800/80 p-5 rounded-2xl border border-slate-700/50 flex justify-between items-center shadow-lg border-l-4 ${isCritical ? 'border-l-red-500' : 'border-l-blue-500'}">
                        <div class="flex-1 pr-4">
                            <div class="flex items-center gap-2 mb-2">
                                <h3 class="font-black text-lg text-white leading-none">${makine}</h3>
                                <span class="text-[9px] bg-slate-700 text-slate-400 px-1.5 py-0.5 rounded font-black tracking-tighter uppercase">${bolum}</span>
                            </div>
                            <p class="text-[11px] text-slate-400 font-medium mb-3">${aciklama}</p>
                            <div class="flex items-center gap-1.5 opacity-60">
                                <span class="material-icons text-[12px]">person</span>
                                <span class="text-[10px] font-bold uppercase tracking-widest">${personel}</span>
                            </div>
                        </div>
                        <div class="text-right flex flex-col items-end gap-2">
                            <span class="px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest border ${isCritical ? 'bg-red-500/10 text-red-500 border-red-500/20' : 'bg-blue-500/10 text-blue-400 border-blue-500/20'}">
                                ${durum}
                            </span>
                        </div>
                    </div>
                `;
            });
        }

        // Başlatma ve Döngü
        window.onload = fetchData;
        setInterval(fetchData, 15000); // 15 saniyede bir kontrol et
    </script>
</body>
</html>
