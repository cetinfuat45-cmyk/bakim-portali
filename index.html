<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakım HUB | Aktif Arızalar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100">

    <nav class="border-b border-slate-800 bg-slate-900/95 backdrop-blur sticky top-0 z-50 p-4 shadow-xl">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="material-icons text-red-500 animate-pulse">warning</span>
                <span class="font-bold text-xl tracking-tight uppercase text-white">AKTİF<span class="text-blue-500 font-black">ARIZALAR</span></span>
            </div>
            <div class="flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                <span class="h-2 w-2 rounded-full bg-green-500"></span>
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest font-mono">HUB CANLI</span>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 py-8">
        <div id="data-list" class="grid gap-4 text-slate-400 text-center py-10">
            Veriler taranıyor...
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSiAuiO1cWDZLOtuFdAkBOU1PNf5mpThgH3yKaL5NHpj0QDrJmpt7XbRuCnQejkxf89oQ_uu1zO-2/pub?gid=0&single=true&output=csv';
        
        function fetchData() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    renderActiveTasks(results.data);
                }
            });
        }

        function renderActiveTasks(data) {
            const container = document.getElementById('data-list');
            container.innerHTML = "";
            
            // Verileri filtrele: P'den Z'ye kadar olan (sonuç/kapanış) alanları boş olanları seç
            // Tablonuzdaki başlıklara göre: "BAKIMI YAPAN-1" (V sütunu civarı) boşsa aktif kabul ediyoruz
            const activeData = data.filter(item => {
                const kapanisSorumlusu = item["BAKIMI YAPAN-1"];
                const makineAdi = item["MAKİNE ADI"];
                
                // KURAL: Makine adı dolu olacak VE Bakımı Yapan/Sonuç sütunu boş olacak
                return makineAdi && (!kapanisSorumlusu || kapanisSorumlusu.trim() === "");
            });

            if (activeData.length === 0) {
                container.innerHTML = `<div class="py-20 opacity-50"><span class="material-icons text-4xl mb-2">check_circle</span><p class="font-bold">Şu an aktif arıza kaydı bulunmuyor.</p></div>`;
                return;
            }

            activeData.reverse().forEach(item => {
                const makine = item["MAKİNE ADI"];
                const bolum = item["BÖLÜM"] || "-";
                const ariza = item["ARIZA TÜRÜ"] || "Belirsiz";
                const aciklama = item["ARIZA AÇIKLAMA"] || "Detay yok";
                const acan = item["ARIZA AÇAN"] || "Sistem";

                container.innerHTML += `
                    <div class="bg-slate-800 p-5 rounded-2xl border border-red-500/20 flex justify-between items-center shadow-lg border-l-4 border-l-red-500 animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div class="flex-1 pr-4">
                            <div class="flex items-center gap-2 mb-1">
                                <h3 class="font-bold text-lg text-white">${makine}</h3>
                                <span class="text-[9px] bg-red-500/10 text-red-400 px-2 py-0.5 rounded border border-red-500/20 uppercase font-black tracking-tighter">${ariza}</span>
                            </div>
                            <p class="text-[11px] text-slate-400 line-clamp-2">${aciklama}</p>
                            <div class="flex items-center gap-2 mt-3 text-[10px] text-slate-500 font-bold italic">
                                <span class="material-icons text-[12px]">person_add</span>
                                <span>Açan: ${acan}</span>
                                <span class="ml-2 bg-slate-700 px-1.5 rounded text-slate-300 font-normal">Bölüm: ${bolum}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="h-10 w-10 rounded-full border-2 border-red-500/30 flex items-center justify-center text-red-500">
                                <span class="material-icons">hourglass_empty</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = fetchData;
        setInterval(fetchData, 15000); // 15 saniyede bir kontrol et
    </script>
</body>
</html>
