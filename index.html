<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakım HUB Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-header: #020617;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --mekanik: #38bdf8;
            --elektrik: #fbbf24;
            --planli: #fb923c;
            --is: #22d3ee;
            --isg: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-size: 14px; overflow-x: hidden; }

        /* Top Counter Header */
        .top-status-bar {
            background: var(--bg-header);
            padding: 5px 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .status-item { display: flex; align-items: center; gap: 4px; }
        .status-item span:last-child { background: #1e293b; padding: 1px 6px; border-radius: 4px; color: #fff; }

        /* Navigation Header */
        nav {
            background: rgba(15, 23, 42, 0.9);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: -1px; }
        .logo span { color: var(--mekanik); }

        /* Grid Section (New Failures) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 8px;
            padding: 10px;
            background: #020617;
        }
        .grid-card {
            background: #1e293b;
            border-top: 3px solid var(--c);
            padding: 8px;
            border-radius: 4px;
            height: 120px;
            display: flex;
            flex-direction: column;
        }
        .grid-card .type { font-size: 9px; font-weight: 800; color: var(--c); display: flex; justify-content: space-between; }
        .grid-card .name { font-size: 13px; font-weight: 700; margin: 4px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .grid-card .desc { font-size: 10px; color: #cbd5e1; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .grid-card .meta { margin-top: auto; font-size: 8px; color: #64748b; display: flex; justify-content: space-between; align-items: center; }

        /* List Section (Work in Progress) */
        .list-container {
            margin-top: 5px;
            padding: 0 10px;
        }
        .list-header-sep {
            border-top: 2px solid #ef4444;
            margin: 10px 0;
            position: relative;
        }
        .table-row {
            display: grid;
            grid-template-columns: 100px 120px 120px 120px 1fr 120px;
            gap: 10px;
            padding: 4px 8px;
            border-bottom: 1px solid #1e293b;
            font-size: 11px;
            align-items: center;
        }
        .table-row:hover { background: rgba(255,255,255,0.05); }
        .row-type { font-weight: 800; font-size: 9px; padding: 2px 5px; border-radius: 3px; background: rgba(255,255,255,0.05); color: var(--c); text-align: center; }

        .c-mekanik { --c: var(--mekanik); }
        .c-elektrik { --c: var(--elektrik); }
        .c-planli { --c: var(--planli); }
        .c-is { --c: var(--is); }
        .c-isg { --c: var(--isg); }
        .c-other { --c: var(--text-dim); }

    </style>
</head>
<body>

    <div class="top-status-bar" id="top-stats">
        <div class="status-item">TOPLAM <span id="s-total">0</span></div>
        <div class="status-item" style="color: var(--mekanik)">MEK <span id="s-mek">0</span></div>
        <div class="status-item" style="color: var(--elektrik)">ELEK <span id="s-elek">0</span></div>
        <div class="status-item" style="color: var(--isg)">İSG <span id="s-isg">0</span></div>
        <div class="status-item">TEKRAR <span id="s-tek">0</span></div>
        <div class="status-item" style="color: var(--planli)">P.BAKIM <span id="s-plan">0</span></div>
        <div class="status-item">DİĞER <span id="s-other">0</span></div>
    </div>

    <div class="grid-container" id="grid-view">
        <!-- New arızas will be here -->
    </div>

    <div class="list-container">
        <div class="list-header-sep"></div>
        <div id="list-view">
            <!-- Active tasks will be here -->
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSiAuiO1cWDZLOtuFdAkBOU1PNf5mpThgH3yKalH5NHpj0QDrJmpt7XbRuCnQejkxF89oQ_uu1zO-2/pub?gid=0&single=true&output=csv';

        function updateStats(data) {
            let s = { total: 0, mek: 0, elek: 0, isg: 0, tek: 0, plan: 0, other: 0 };
            data.forEach(row => {
                const tur = (row[8] || "").toLowerCase();
                const bit = (row[20] || "").trim();
                if (bit === "") {
                    s.total++;
                    if (tur.includes("mekanik")) s.mek++;
                    else if (tur.includes("elektrik")) s.elek++;
                    else if (tur.includes("isg") || tur.includes("güvenlik")) s.isg++;
                    else if (tur.includes("planlı")) s.plan++;
                    else s.other++;
                }
            });
            document.getElementById('s-total').innerText = s.total;
            document.getElementById('s-mek').innerText = s.mek;
            document.getElementById('s-elek').innerText = s.elek;
            document.getElementById('s-isg').innerText = s.isg;
            document.getElementById('s-plan').innerText = s.plan;
            document.getElementById('s-other').innerText = s.other;
        }

        function getTypeInfo(tur) {
            tur = tur.toUpperCase();
            if (tur.includes("MEKANİK")) return { c: "c-mekanik", label: "MEKANİK ARIZA" };
            if (tur.includes("ELEKTRİK")) return { c: "c-elektrik", label: "ELEKTRİK ARIZA" };
            if (tur.includes("PLANLI")) return { c: "c-planli", label: "PLANLI BAKIM KODU" };
            if (tur.includes("YAPILAN")) return { c: "c-is", label: "YAPILAN İŞ HAKKINDA" };
            if (tur.includes("İSG") || tur.includes("GÜVENLİ")) return { c: "c-isg", label: "İSG GÜVENLİĞİ" };
            return { c: "c-other", label: tur };
        }

        function processData(rows) {
            const dataRows = rows.slice(1);
            updateStats(dataRows);

            const grid = document.getElementById('grid-view');
            const list = document.getElementById('list-view');
            
            // Bugünün tarihini al (G.A.Y formatında: 27.04.2026)
            const today = new Date().toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
            
            let gridHtml = "";
            let listHtml = "";

            dataRows.forEach(row => {
                const tarihFull = row[0] || "";
                const tarihSadece = tarihFull.split(' ')[0] || "";
                const acan = row[2] || "-";
                const bolum = row[4] || "-";
                const turRaw = (row[8] || "DİĞER");
                const aciklama = row[10] || "-";
                const gorevli = row[14] || "-";
                const makineP = (row[15] || "").trim();
                const bit = (row[20] || "").trim();

                if (bit === "" && tarihFull !== "" && aciklama !== "-") {
                    const info = getTypeInfo(turRaw);
                    const displayName = (makineP === "" || makineP.startsWith('#')) ? bolum : makineP;

                    // BUGÜNÜN ARALARI -> KART (GRID)
                    if (tarihSadece === today) {
                        gridHtml += `
                            <div class="grid-card ${info.c}">
                                <div class="type">${info.label} <span class="material-icons" style="font-size:10px">bolt</span></div>
                                <div class="name">${displayName}</div>
                                <div class="desc">${aciklama}</div>
                                <div class="meta">
                                    <span>${acan}</span>
                                    <span>${tarihFull.split(' ')[1] || ''}</span>
                                </div>
                            </div>
                        `;
                    } 
                    // ESKİ ARIZALAR -> TABLO (LİSTE)
                    else {
                        listHtml += `
                            <div class="table-row">
                                <div style="color:#64748b">${tarihSadece} <span style="color:#94a3b8">${tarihFull.split(' ')[1] || ''}</span></div>
                                <div style="font-weight:700">${acan}</div>
                                <div style="color:var(--mekanik)">${displayName}</div>
                                <div class="row-type ${info.c}">${info.label}</div>
                                <div style="color:#cbd5e1">${aciklama}</div>
                                <div style="text-align:right; font-weight:800; color:var(--mekanik)">${gorevli}</div>
                            </div>
                        `;
                    }
                }
            });

            grid.innerHTML = gridHtml || '<div style="padding:20px; color:#64748b">Bugün henüz bir arıza girilmedi.</div>';
            list.innerHTML = listHtml || '<div style="padding:20px; color:#64748b">Eski bekleyen iş bulunmuyor.</div>';
        }

        function fetchData() {
            const url = CSV_URL + '&t=' + new Date().getTime();
            Papa.parse(url, {
                download: true,
                header: false,
                skipEmptyLines: true,
                complete: function(res) { processData(res.data); }
            });
        }

        window.onload = fetchData;
        setInterval(fetchData, 20000);
    </script>
</body>
</html>
