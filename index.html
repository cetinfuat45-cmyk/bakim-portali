<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>İş Takip ve Arıza Paneli</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap');
        @import url('https://fonts.cdnfonts.com/css/digital-7-mono');

        :root {
            --bg-dark: #1e293b;
            /* Dark Slate Background */
            --card-bg: #334155;
            /* Slightly lighter card bg */
            --header-bg: #0f172a;
            /* Darker header */
            --text-main: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-yellow: #eaff00;
            --accent-blue: #3b82f6;

            /* New Status Colors */
            --color-mekanik: #00bfff;
            --color-elektrik: #ffff00;
            --color-isg: #ff0000;
            --color-tekrar: #ac21e6;
            --color-bakim: #ef9b0f;
            --color-sikayet: #ef9b0f;
            --color-diger: #3b82f6;
            --border-color: #475569;
            --card-font-size: 13px;
            /* Default Font Size */
            --card-min-width: 280px;
            /* Default Min Width */
            --list-font-size: 13px;
            /* Default List Font Size */
        }


        /* --- GLOBAL RESET FOR TV --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* High Res / Crisp Text Settings */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        /* --- CARD STYLE (High Res - Optimized) --- */
        .job-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 4px 6px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            position: relative;
            min-height: var(--card-min-height, 30px);
            font-size: var(--card-font-size);
            min-width: 200px;
        }

        .job-card:hover {
            border-color: var(--accent-blue);
            z-index: 10;
        }

        /* --- STATS BAR --- */
        .stats-bar {
            background-color: rgba(15, 23, 42, 0.95);
            display: flex;
            gap: 2px;
            padding: 0 20px;
            height: 40px;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            overflow-x: auto;
        }

        .stat-item {
            background: var(--card-bg);
            padding: 2px 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            border-right: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .stat-item-value {
            color: var(--text-main);
            font-size: 14px;
            font-weight: 800;
        }

        .stat-item.active {
            background: var(--header-bg);
            border-bottom: 2px solid var(--accent-blue);
            color: var(--accent-blue);
        }

        .operator-stats-container {
            display: flex;
            align-items: center;
            margin-left: 20px;
            padding-left: 0;
            border-left: 1px solid var(--border-color);
            height: 100%;
        }

        .operator-item {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--card-bg);
            border-radius: 0;
            border-left: 0.5px solid rgba(255, 255, 255, 0.1);
            border-top: 0.5px solid transparent;
            border-bottom: 0.5px solid transparent;
            border-right: 0.5px solid transparent;
            color: #cbd5e1;
            font-weight: 700;
            font-size: 11px;
        }

        .operator-score {
            font-size: 14px;
            color: #fbbf24;
            font-weight: 800;
        }

        .operator-item.operator-active {
            border: 2px solid var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
            z-index: 5;
            position: relative;
        }

        .operator-item.operator-inactive {
            opacity: 0.5;
        }

        .job-card {
            background: var(--card-bg);
            border: 0.5px solid var(--border-color);
            padding: 2px 4px;
            border-radius: 4px;
            display: inline-table;
            flex-direction: column;
            gap: 0;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            width: auto;
            line-height: 0.9;
        }

        .job-card:hover {
            transform: none;
            border-color: #fff;
            z-index: 10;
        }

        .status-isg {
            border: 1px solid #ff0000 !important;
            color: #fff !important;
            background: rgba(255, 0, 0, 0.2) !important;
            font-weight: bold;
        }

        .neon-alert-text {
            color: #ff0000 !important;
            font-weight: 900;
        }

        #yeni-is-bildirim.isg-alert {
            border: 2px solid #ff0000 !important;
        }

        .header-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .header-logo span {
            color: var(--text-main);
            font-weight: 400;
        }

        .header-center-title {
            font-size: 20px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            flex: 1;
            display: flex;
            justify-content: center;
            overflow: hidden;
            margin: 0 20px;
        }

        .header-clock {
            font-family: 'Digital-7 Mono', monospace;
            font-size: 32px;
            color: var(--accent-green);
            background: #000;
            padding: 2px 10px;
            border-radius: 4px;
            border: 1px solid var(--accent-green);
        }

        .stats-bar {
            background-color: rgba(15, 23, 42, 0.8);
            display: flex;
            gap: 2px;
            padding: 0 20px;
            height: 40px;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .stats-bar::-webkit-scrollbar {
            height: 4px;
            background: #1e293b;
        }

        .stats-bar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 2px;
        }

        .stat-item {
            background: var(--card-bg);
            padding: 2px 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            border-right: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .stat-item-value {
            color: var(--text-main);
            font-size: 14px;
            font-weight: 800;
        }

        .stat-item.active {
            background: var(--header-bg);
            border-bottom: 2px solid var(--accent-blue);
            color: var(--accent-blue);
        }

        .operator-stats-container {
            display: flex;
            align-items: center;
            margin-left: 20px;
            padding-left: 0;
            border-left: 1px solid var(--border-color);
            height: 100%;
        }

        .operator-item {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--card-bg);
            padding: 2px 8px;
            border-radius: 0;
            border-left: 0.5px solid rgba(255, 255, 255, 0.1);
            border-top: 0.5px solid transparent;
            border-bottom: 0.5px solid transparent;
            border-right: 0.5px solid transparent;
            color: #cbd5e1;
            font-weight: 700;
            font-size: 11px;
        }

        .operator-score {
            font-size: 14px;
            color: #fbbf24;
            font-weight: 800;
        }

        .operator-item.operator-active {
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-blue), inset 0 0 5px var(--accent-blue);
            z-index: 5;
            position: relative;
        }

        .operator-item.operator-inactive {
            opacity: 0.4;
            filter: grayscale(0.5);
        }

        .main-content {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            position: relative;
        }

        #yeni-grid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-content: start;
        }

        .size-s {
            width: auto;
            max-width: 380px;
        }

        .size-m {
            width: auto;
            max-width: 650px;
        }

        .size-l {
            width: auto;
            max-width: 100%;
        }

        .job-card {
            background: var(--card-bg);
            border: 0.5px solid var(--border-color);
            padding: 2px 4px;
            border-radius: 4px;
            display: inline-table;
            flex-direction: column;
            gap: 0;
            position: relative;
            min-height: auto;
            font-size: var(--card-font-size);
            width: auto;
            line-height: 0.9;
        }

        .job-card.size-l,
        .featured-card {
            padding: 2px 4px !important;
            height: auto !important;
            min-height: auto !important;
            gap: 0 !important;
        }

        .job-card.size-l .requester-name,
        .featured-card .requester-name {
            margin-bottom: 1px !important;
            line-height: 1 !important;
        }

        .job-card.size-l .job-desc,
        .featured-card .job-desc {
            margin-top: 2px !important;
            line-height: 1.1 !important;
        }

        .job-card.size-l .card-header-line,
        .featured-card .card-header-line {
            margin-bottom: 1px !important;
        }

        .job-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .card-header-line {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2px;
        }

        .job-group-header {
            font-size: 1.4em;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .requester-name {
            font-size: 1.1em;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0;
        }

        .job-time {
            font-family: 'Digital-7 Mono', monospace;
            font-size: 1.3em;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .job-desc {
            font-size: 1em;
            color: #00ff00;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .list-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
        }

        .scroll-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        @keyframes scroll-pingpong {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(calc(-100% + 300px));
            }

            100% {
                transform: translateY(0);
            }
        }

        .list-header {
            font-size: 1.2em;
            color: var(--text-secondary);
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: 700;
            display: none;
        }

        .group-block {
            display: flex;
            flex-direction: column;
            gap: 0;
            border: none;
            border-radius: 0;
            overflow: hidden;
            margin-bottom: 0px;
        }

        .group-header {
            padding: 2px 6px;
            font-size: 0.7em;
            font-weight: 900;
            line-height: 1.0;
            border-left: none;
            background: transparent;
            color: var(--group-color, #fff);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid var(--group-color, #475569);
        }

        .group-count {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
        }

        .old-job-row {
            background: var(--card-bg);
            min-height: auto;
            height: min-content;
            line-height: 1.0;
            padding: 0 4px;
            display: grid;
            grid-template-columns: 110px 120px 50px 120px 100px 1fr 120px;
            align-items: center;
            gap: 10px;
            border-bottom: 0.5px solid var(--group-color, #475569);
            font-size: var(--list-font-size);
            transition: background 0.2s;
            border-radius: 0;
        }

        .group-block .old-job-row:last-child {
            border-bottom: none;
        }

        .group-table-header {
            display: grid;
            grid-template-columns: 110px 120px 50px 120px 100px 1fr 120px;
            gap: 10px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid var(--group-color, #475569);
            color: var(--group-color, #fff);
            font-weight: 900;
            font-size: 0.8em;
            text-transform: uppercase;
        }

        .old-job-row:hover {
            background: #475569;
        }

        .row-date {
            color: var(--text-secondary);
            font-size: 0.8em;
            white-space: nowrap;
        }

        .row-worker {
            color: #00ff7f;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-requester {
            color: #fff;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-shift {
            color: #94a3b8;
            font-size: 0.85em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .row-machine-name {
            color: #e2e8f0;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-type {
            font-size: 0.75em;
            font-weight: 800;
            text-transform: uppercase;
            padding: 0;
            border-radius: 4px;
            background: transparent;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-desc {
            color: #cbd5e1;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 1em;
        }

        .status-mekanik {
            border-color: var(--color-mekanik) !important;
            color: var(--color-mekanik) !important;
        }

        .status-elektrik {
            border-color: var(--color-elektrik) !important;
            color: var(--color-elektrik) !important;
        }

        .status-isg {
            border: 1px solid #ff0000 !important;
            color: #fff !important;
            background: rgba(255, 0, 0, 0.1) !important;
            font-weight: bold;
        }

        .neon-alert-text {
            color: #ff0000 !important;
            font-weight: 900;
            animation: text-neon-flash 0.5s infinite alternate;
        }

        @keyframes text-neon-flash {
            from {
                text-shadow: 0 0 1px #ff0000, 0 0 2px #ff0000;
                opacity: 1;
            }

            to {
                text-shadow: 0 0 2px #ff0000, 0 0 3px #ff0000, 0 0 5px #ff0000;
                opacity: 0.8;
            }
        }

        .status-tekrar {
            border-color: var(--color-tekrar) !important;
            color: var(--color-tekrar) !important;
        }

        .status-bakim {
            border-color: var(--color-bakim) !important;
            color: var(--color-bakim) !important;
        }

        .status-sikayet {
            border-color: var(--color-sikayet) !important;
            color: var(--color-sikayet) !important;
        }

        .status-diger {
            border-color: var(--color-diger) !important;
            color: var(--color-diger) !important;
        }

        #kritik-alarm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(220, 0, 0, 0.95);
            display: none;
            z-index: 20002;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 60px;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 0 50px #000;
            padding: 40px;
            pointer-events: none;
            animation: flash-animation 0.3s infinite alternate;
        }

        @keyframes flash-animation {
            from {
                opacity: 0.5;
                transform: scale(0.97);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #yeni-is-bildirim {
            position: fixed;
            top: 50px;
            right: -800px;
            width: 600px;
            background: #0f172a;
            color: white;
            border-radius: 12px;
            padding: 0;
            box-shadow: -10px 10px 40px rgba(0, 0, 0, 0.8);
            z-index: 20000;
            transition: right 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            border: 4px solid var(--accent-red);
            overflow: hidden;
        }

        #yeni-is-bildirim.isg-alert {
            border: 1px solid #ff0000 !important;
            box-shadow: 0 0 10px #ff0000;
            animation: neon-pulse 2s infinite alternate !important;
        }

        #yeni-is-bildirim.active {
            right: 40px;
        }

        .bildirim-header {
            background: var(--accent-red);
            padding: 15px;
            font-weight: 900;
            font-size: 24px;
            text-align: center;
            letter-spacing: 1px;
        }

        .bildirim-body {
            padding: 25px;
            line-height: 1.4;
            font-size: 20px;
        }

        #bildirim-countdown {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 10px;
            border-radius: 50%;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        .footer-bar {
            background: var(--header-bg);
            border-top: 1px solid var(--border-color);
            padding: 5px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: var(--border-color);
            font-weight: 700;
            flex-shrink: 0;
        }

        .neon-akg {
            color: var(--accent-blue);
            text-shadow: 0 0 5px var(--accent-blue);
            margin-left: 5px;
        }

        .controls-bar {
            background: var(--header-bg);
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
            padding: 2px 20px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .ctrl-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
        }

        .ctrl-btn:hover {
            background: var(--border-color);
            color: #fff;
        }


        .operator-row {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 5px 10px;
            display: flex;
            align-items: center;
            overflow-x: auto;
            white-space: nowrap;
            min-height: 30px;
            background: #0f172a;
        }

        .main-stats-row {
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2px 10px;
            border-bottom: 1px solid var(--border-color);
            gap: 10px;
            flex-wrap: wrap;
        }

        .main-stats-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .today-title {
            font-weight: 900;
            font-size: 13px;
            letter-spacing: 1px;
            color: #fff;
            margin-right: 10px;
        }

        .stat-item {
            font-size: 11px;
            padding: 2px 5px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            font-weight: bold;
            color: #ccc;
        }

        .controls-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media screen and (max-width: 768px) {
            .header-logo {
                font-size: 18px;
            }

            .header-center-title {
                font-size: 14px;
                margin: 0 5px;
            }

            .header-clock {
                font-size: 20px;
                padding: 2px 5px;
            }

            .stats-bar {
                padding: 0 10px;
                gap: 5px;
            }

            .controls {
                gap: 5px;
            }

            .controls select {
                font-size: 10px;
            }

            .ctrl-btn {
                padding: 2px 4px;
            }

            .job-card {
                min-width: 100%;
                margin-bottom: 5px;
            }

            .today-title-bar {
                flex-wrap: wrap;
                font-size: 11px;
                padding: 5px;
                height: auto;
            }

            .today-title-bar .stat-item {
                font-size: 10px;
                padding: 2px 4px;
            }

            .old-job-row {
                padding: 8px;
                gap: 8px;
                flex-wrap: wrap;
            }

            .row-desc {
                width: 100%;
                margin-top: 4px;
            }
        }

        /* --- REFRESH MODAL STYLES --- */
        #refresh-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 100000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .modal-content-card {
            background: #1e293b;
            padding: 60px;
            border-radius: 30px;
            border: 5px solid var(--accent-blue);
            max-width: 800px;
            box-shadow: 0 0 100px rgba(59, 130, 246, 0.3);
        }

        .modal-content-card h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #fff;
            font-weight: 900;
        }

        .modal-content-card p {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-weight: 700;
            line-height: 1.4;
        }

        .modal-refresh-btn {
            background: var(--accent-blue);
            color: #fff;
            border: none;
            padding: 25px 70px;
            font-size: 2.5rem;
            font-weight: 900;
            border-radius: 100px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.4);
        }

        .modal-refresh-btn:hover {
            background: #2563eb;
        }

        .modal-refresh-btn:active {
            transform: scale(0.95);
        }

        .btn-open-refresh {
            background: #f59e0b !important;
            color: #000 !important;
            font-weight: 900 !important;
            border: none !important;
            padding: 4px 10px !important;
            border-radius: 4px !important;
            font-size: 10px !important;
            cursor: pointer !important;
        }
    </style>
</head>

<body>

    <div id="kritik-alarm-overlay">🚨 KRİTİK SEVİYE UYARISI 🚨</div>

    <div id="yeni-is-bildirim">
        <div class="bildirim-header">YENİ İŞ EMRİ</div>
        <div class="bildirim-body" id="bildirim-detay"></div>
    </div>

    <!-- ROW 2: Main UI (Title + Stats + Controls) -->
    <div class="main-stats-row">
        <!-- Left Side: Title + Main Stats -->
        <div class="main-stats-left">
            <div class="stat-item active">TOPLAM: <span class="stat-item-value" id="stat-toplam">0</span></div>
            <div class="stat-item" style="color:var(--color-mekanik);">MEK: <span class="stat-item-value"
                    id="stat-mekanik">0</span>
            </div>
            <div class="stat-item" style="color:var(--color-elektrik);">ELEK: <span class="stat-item-value"
                    id="stat-elektrik">0</span></div>
            <div class="stat-item" style="color:var(--color-isg);">İSG: <span class="stat-item-value"
                    id="stat-isg">0</span>
            </div>
            <div class="stat-item" style="color:var(--color-tekrar);">TEKRAR: <span class="stat-item-value"
                    id="stat-tekrar">0</span></div>
            <div class="stat-item" style="color:var(--color-bakim);">P.BAKIM: <span class="stat-item-value"
                    id="stat-bakim">0</span></div>
            <div class="stat-item" style="color:var(--color-diger);">DİĞER: <span class="stat-item-value"
                    id="stat-diger">0</span></div>
        </div>

        <!-- Right Side: Controls -->
        <div class="controls-container">
            <div class="controls">
                <button class="btn-open-refresh" onclick="openRefreshModal()">SİSTEMİ TAZELE</button>

                <span style="font-size:8px; color:#64748b; font-weight:bold;">YAZI:</span>
                <select id="font-size-select"
                    style="background:#000; color:#fff; border:1px solid #333; padding:1px; font-size:8px;"
                    onchange="setFontSize(this.value); saveFontSize(this.value);">
                    <option value="4">4px</option>
                    <option value="5">5px</option>
                    <option value="6">6px</option>
                    <option value="7">7px</option>
                    <option value="8">8px</option>
                    <option value="9">9px</option>
                    <option value="10">10px</option>
                    <option value="11">11px</option>
                    <option value="12">12px</option>
                    <option value="13" selected>13px</option>
                    <option value="14">14px</option>
                    <option value="16">16px</option>
                    <option value="18">18px</option>
                    <option value="20">20px</option>
                    <option value="24">24px</option>
                </select>

                <span style="font-size:8px; color:#64748b; font-weight:bold; margin-left:5px;">SATIR:</span>
                <select id="list-font-size-select"
                    style="background:#000; color:#fff; border:1px solid #333; padding:1px; font-size:8px;"
                    onchange="setListFontSize(this.value); saveListFontSize(this.value);">
                    <option value="10">10px</option>
                    <option value="11">11px</option>
                    <option value="12">12px</option>
                    <option value="13" selected>13px</option>
                    <option value="14">14px</option>
                    <option value="16">16px</option>
                </select>
                <button class="ctrl-btn" onclick="toggleFullScreen()" title="Tam Ekran">⛶</button>
                <span id="system-monitor"
                    style="font-size:9px; color:#4ade80; font-weight:bold; margin-left:5px; border:1px solid #334155; padding:0 4px; background:#0f172a;">
                    FPS: -- | RAM: --
                </span>
            </div>
        </div>
    </div>

    <!-- Main Grid -->
    <div class="main-content">
        <div id="yeni-grid-container"></div>
        <div id="gecmis-liste-container" class="list-container"></div>
    </div>

    <!-- Footer -->
    <div class="footer-bar">
        <div style="display:flex; align-items:center; flex-grow:1; overflow:hidden;">
            <span
                style="font-family:'Digital-7 Mono', monospace; color:var(--accent-yellow); font-size: 1.2em; margin-right:15px; white-space:nowrap;">
                (<span id="refresh-timer" style="color:#fff;">15</span>)
            </span>
            <div id="footer-ops" style="display:flex; width:100%; overflow-x:auto; align-items:center; height:100%;">
            </div>
        </div>
        <span style="white-space:nowrap; margin-left:10px; font-size:10px;">TASARIM: <span class="neon-akg">AKG</span>
            BAKIM</span>
    </div>

    <!-- REFRESH MODAL -->
    <div id="refresh-modal">
        <div class="modal-content-card">
            <h1>SİSTEM TAZELEME</h1>
            <p>Sistemin stabil kalması için lütfen sayfayı yenileyin.</p>
            <button class="modal-refresh-btn" onclick="performManualRefresh()">SİSTEMİ TAZELE</button>
        </div>
    </div>

    <script>
        let sonKayitSayisi = -1;
        let bildirimTimer;
        let wakeLock = null;

        // --- STABILITY & MANUAL REFRESH CONSTANTS ---
        const REFRESH_INTERVAL = 3 * 60 * 60 * 1000; // 3 Hours
        const REFRESH_KEY = 'gelen_ariza_last_refresh';

        function openRefreshModal() {
            document.getElementById('refresh-modal').style.display = 'flex';
        }

        function performManualRefresh() {
            localStorage.setItem(REFRESH_KEY, Date.now());
            if (typeof google !== 'undefined') {
                google.script.run.withSuccessHandler(function (url) {
                    window.top.location.href = url;
                }).getScriptUrl();
            } else {
                window.location.reload();
            }
        }

        function checkManualRefresh() {
            const last = localStorage.getItem(REFRESH_KEY);
            if (!last || (Date.now() - parseInt(last) > REFRESH_INTERVAL)) {
                openRefreshModal();
            }
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock is active');
                }
            } catch (err) { console.error(`${err.name}, ${err.message}`); }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        function setFontSize(val) {
            document.documentElement.style.setProperty('--card-font-size', val + 'px');
            const newMinWidth = Math.max(220, val * 18);
            document.documentElement.style.setProperty('--card-min-width', newMinWidth + 'px');
            document.documentElement.style.setProperty('--card-min-height', Math.max(40, val * 4) + 'px');
        }

        function saveFontSize(val) { localStorage.setItem('userFontSize', val); }

        function setListFontSize(val) {
            document.documentElement.style.setProperty('--list-font-size', val + 'px');
        }

        function saveListFontSize(val) { localStorage.setItem('userListFontSize', val); }

        let bildirimCountdownInterval;

        function bildirimGoster(sonIs) {
            const panel = document.getElementById('yeni-is-bildirim');
            if (!panel) return;
            const detay = document.getElementById('bildirim-detay');

            const tur = (sonIs[3] || "").toString().toUpperCase();
            if (tur.includes('GÜVENLİ') || tur.includes('İSG')) {
                panel.classList.add('isg-alert');
            } else {
                panel.classList.remove('isg-alert');
            }

            const tarih = sonIs[0] || '-';
            const talepEden = sonIs[1] || '-';
            const turLabel = tur || '-';
            const aciklama = sonIs[4] || '-';

            let remainingTime = 60;

            detay.innerHTML = `
                <div id="bildirim-countdown">${remainingTime}</div>
                <div style="margin-bottom:15px; font-weight:bold; color:#cbd5e1; font-size:22px;">${tarih} - ${talepEden}</div>
                <div style="margin-bottom:15px; display:inline-block; padding:4px 12px; background:#334155; border-radius:6px; font-size:20px; border:1px solid #64748b;">${turLabel}</div>
                <div style="font-size:28px; color:#fff; font-weight:bold; line-height:1.2;">${aciklama}</div>
                <div style="margin-top:20px; text-align:right; font-size:14px; color:#64748b;">Otomatik kapanacak...</div>
            `;

            panel.classList.add('active');
            clearTimeout(bildirimTimer);
            clearInterval(bildirimCountdownInterval);

            bildirimCountdownInterval = setInterval(() => {
                remainingTime--;
                const countdownEl = document.getElementById('bildirim-countdown');
                if (countdownEl) countdownEl.innerText = remainingTime;
                if (remainingTime <= 0) clearInterval(bildirimCountdownInterval);
            }, 1000);

            bildirimTimer = setTimeout(() => {
                panel.classList.remove('active');
                clearInterval(bildirimCountdownInterval);
            }, 60000);
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        let lastDataString = "";

        function tumPaneliCiz(res) {
            if (!res || !res.tablo2) return;
            const currentDataString = JSON.stringify(res.tablo2) + (res.operatorler ? JSON.stringify(res.operatorler) : "");
            if (currentDataString === lastDataString) return;
            lastDataString = currentDataString;

            const operatorContainer = document.getElementById('footer-ops');
            if (operatorContainer && res.operatorler && Array.isArray(res.operatorler)) {
                const trNormalize = (str, isComparison = false) => {
                    if (!str) return "";
                    let s = str.toString().trim()
                        .replace(/İ/g, 'I').replace(/ı/g, 'i')
                        .replace(/Ğ/g, 'G').replace(/ğ/g, 'g')
                        .replace(/Ü/g, 'U').replace(/ü/g, 'u')
                        .replace(/Ş/g, 'S').replace(/ş/g, 's')
                        .replace(/Ö/g, 'O').replace(/ö/g, 'o')
                        .replace(/Ç/g, 'C').replace(/ç/g, 'c')
                        .toUpperCase();
                    if (isComparison) s = s.replace(/[^A-Z0-9]/g, "");
                    return s;
                };

                const opNames = res.operatorler && res.operatorler.length > 0 ? res.operatorler[0] : [];
                const opScores = res.operatorler && res.operatorler.length > 1 ? res.operatorler[1] : [];
                const hour = new Date().getHours();
                let activeColIndex = -1;

                if (res.vardiyalar && res.vardiyalar.length > 0) {
                    if (hour >= 8 && hour < 16) activeColIndex = 0;
                    else if (hour >= 16 && hour < 24) activeColIndex = 1;
                    else activeColIndex = 2;
                }

                let html = "";
                const colors = ['#0ea5e9', '#22c55e', '#eab308', '#f97316', '#ef4444', '#a855f7', '#ec4899', '#6366f1'];
                const shiftGroups = [
                    { id: 0, label: "08:16", colIndex: 0 },
                    { id: 1, label: "16:00", colIndex: 1 },
                    { id: 2, label: "00:08", colIndex: 2 }
                ];

                let globalColorIndex = 0;
                shiftGroups.forEach(group => {
                    const groupOps = [];
                    if (res.vardiyalar && res.vardiyalar.length > 1) {
                        for (let r = 1; r < res.vardiyalar.length; r++) {
                            const row = res.vardiyalar[r];
                            if (row.length > group.colIndex) {
                                const name = row[group.colIndex];
                                if (name && name.toString().trim() !== "") {
                                    groupOps.push(trNormalize(name, true));
                                }
                            }
                        }
                    }
                    if (groupOps.length === 0) return;
                    const isCurrentShift = (group.colIndex === activeColIndex);
                    const opacity = isCurrentShift ? "1" : "0.5";
                    const grayscale = isCurrentShift ? "0" : "1";

                    html += `<div style="display:flex; align-items:center; height:100%; border-right:1px solid #444; margin-right:1px; opacity:${opacity}; filter:grayscale(${grayscale});">
                        <span style="font-size:10px; font-weight:bold; color:#ccc; padding:0 5px; writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);">${group.label}</span>
                    </div>`;

                    groupOps.forEach(opName => {
                        let matchingScore = "?";
                        if (opNames) {
                            const foundIndex = opNames.findIndex(n => {
                                const norm = trNormalize(n, true);
                                return norm === opName || norm.includes(opName) || opName.includes(norm);
                            });
                            if (foundIndex !== -1 && opScores) matchingScore = opScores[foundIndex] || "0";
                        }
                        let displayScore = matchingScore !== "?" ? matchingScore + "dk" : "";
                        let bgStyle = isCurrentShift ? `color:${colors[globalColorIndex++ % colors.length]}; font-weight:bold;` : `color:#666; font-weight:normal; border-right:1px solid #333;`;
                        html += `<div style="${bgStyle} padding:0 6px; display:flex; align-items:center; margin-right:1px; height:100%; white-space:nowrap; opacity:${opacity}; filter:grayscale(${grayscale});">
                            <span style="font-size:10px;">${opName}</span> <span style="font-size:10px; margin-left:3px;">${displayScore}</span>
                        </div>`;
                    });
                });
                operatorContainer.innerHTML = html;
            }

            let stats = { toplam: 0, mekanik: 0, elektrik: 0, isg: 0, tekrar: 0, bakim: 0, sikayet: 0, diger: 0 };
            const dataRows = res.tablo2.slice(1);
            stats.toplam = dataRows.length;

            if (sonKayitSayisi !== -1 && stats.toplam > sonKayitSayisi) {
                if (dataRows.length > 0) bildirimGoster(dataRows[dataRows.length - 1]);
            }
            sonKayitSayisi = stats.toplam;

            const gridContainer = document.getElementById('yeni-grid-container');
            const listContainer = document.getElementById('gecmis-liste-container');
            if (!gridContainer || !listContainer) return;

            gridContainer.innerHTML = "";
            listContainer.innerHTML = "";

            let gridHtml = "";
            const groups = {
                'mekanik': { label: 'MEKANİK ARIZA', color: 'var(--color-mekanik)', items: [] },
                'elektrik': { label: 'ELEKTRİK ARIZA', color: 'var(--color-elektrik)', items: [] },
                'isg': { label: 'İŞ GÜVENLİĞİ !!!', color: 'var(--color-isg)', items: [] },
                'tekrar': { label: 'TEKRAR EDEN ARIZA !!!!', color: 'var(--color-tekrar)', items: [] },
                'bakim': { label: 'PLANLI BAKIM KODU', color: 'var(--color-bakim)', items: [] },
                'sikayet': { label: 'ŞİKAYET VEYA ÖNERİ', color: 'var(--color-sikayet)', items: [] },
                'diger': { label: 'DİĞER İŞLER', color: 'var(--color-diger)', items: [] }
            };

            const today = new Date();
            const todayStr = `${String(today.getDate()).padStart(2, '0')}.${String(today.getMonth() + 1).padStart(2, '0')}.${today.getFullYear()}`;
            let hasOlderItems = false;
            const reversedData = [...dataRows].reverse();

            reversedData.forEach((row, index) => {
                const rDateFull = row[0] || "";
                const rDate = rDateFull.substring(0, 16);
                const rReq = row[1] || "";
                const rShift = row[2] || "";
                const rType = (row[3] || "").toString().toUpperCase();
                const rDesc = row[4] || "";
                const rMach = row[5] || "";
                const rWorker = row[6] || "";

                let targetGroup = 'diger';
                let borderClass = 'status-diger';
                if (rType.includes('MEKANİK')) { borderClass = 'status-mekanik'; stats.mekanik++; targetGroup = 'mekanik'; }
                else if (rType.includes('ELEKTRİK')) { borderClass = 'status-elektrik'; stats.elektrik++; targetGroup = 'elektrik'; }
                else if (rType.includes('GÜVENLİ') || rType.includes('İSG')) { borderClass = 'status-isg'; stats.isg++; targetGroup = 'isg'; }
                else if (rType.includes('TEKRAR')) { borderClass = 'status-tekrar'; stats.tekrar++; targetGroup = 'tekrar'; }
                else if (rType.includes('PLANLI') || rType.includes('BAKIM')) { borderClass = 'status-bakim'; stats.bakim++; targetGroup = 'bakim'; }
                else { stats.diger++; targetGroup = 'diger'; }

                if (rDate.substring(0, 10) === todayStr) {
                    const grpColor = groups[targetGroup].color;
                    let formattedReq = rReq;
                    if (rReq && rReq.trim().includes(" ")) {
                        const p = rReq.trim().split(/\s+/);
                        formattedReq = p[0].charAt(0) + '.' + p[p.length - 1];
                    }
                    const len = rDesc.length;
                    let sizeClass = len > 150 ? "size-l" : (len > 60 ? "size-m" : "size-s");
                    gridHtml += `<div class="job-card ${borderClass} ${sizeClass} ${index === 0 ? 'featured-card' : ''}">
                        <div class="card-header-line">
                            <div class="job-group-header" style="color:${grpColor}">${rType}</div>
                            <div class="job-time">${rDate.substring(11, 16)}</div>
                        </div>
                        <div class="requester-name">${formattedReq || '-'}</div>
                        ${(rMach || rShift) ? `<div style="display:flex; justify-content:space-between; font-size:0.85em; color:var(--text-secondary); margin-top:4px; padding-bottom:4px; border-bottom:1px solid rgba(255,255,255,0.1);">
                            <span style="color:${grpColor}">${rMach}</span><span>${rShift ? ' / ' + rShift : ''}</span>
                        </div>` : ''}
                        ${rWorker ? `<div style="font-size:0.9em; color:var(--accent-yellow); font-weight:bold; margin-top:4px;">Görevli: ${rWorker}</div>` : ''}
                        <div class="job-desc" style="margin-top:8px;">${rDesc}</div>
                    </div>`;
                } else {
                    hasOlderItems = true;
                    groups[targetGroup].items.push({ date: rDate, req: rReq, shift: rShift, type: rType, desc: rDesc, mach: rMach, worker: rWorker, cls: borderClass });
                }
            });

            gridContainer.innerHTML = gridHtml;
            if (hasOlderItems) {
                let innerList = "";
                ['isg', 'mekanik', 'elektrik', 'tekrar', 'bakim', 'sikayet', 'diger'].forEach(key => {
                    const grp = groups[key];
                    if (grp.items.length > 0) {
                        innerList += `<div class="group-block" style="--group-color:${grp.color}"><div class="group-header">${grp.label} <span class="group-count">${grp.items.length}</span></div>`;
                        grp.items.forEach(item => {
                            innerList += `<div class="old-job-row ${item.cls}">
                                <div class="row-date">${item.date}</div><div class="row-requester">${item.req || '-'}</div><div class="row-shift">${item.shift || '-'}</div><div class="row-machine-name">${item.mach || '-'}</div><div class="row-type">${item.type}</div><div class="row-desc">${item.desc}</div><div class="row-worker">${item.worker || '-'}</div>
                            </div>`;
                        });
                        innerList += `</div>`;
                    }
                });
                listContainer.innerHTML = `<div class="scroll-wrapper" id="scroll-content">${innerList}</div>`;
                listContainer.style.display = 'flex';
                setTimeout(() => {
                    const w = document.getElementById('scroll-content');
                    if (w) {
                        const dist = w.scrollHeight - listContainer.clientHeight;
                        if (dist > 0) {
                            if (!document.getElementById('opt-scroll')) {
                                let s = document.createElement('style'); s.id = 'opt-scroll'; s.textContent = '@keyframes optS { 0%,100%{transform:translateY(0);} 50%{transform:translateY(var(--sd));} }'; document.head.appendChild(s);
                            }
                            w.style.setProperty('--sd', `-${dist}px`);
                            w.style.animation = `optS ${dist / 10}s ease-in-out infinite`;
                        }
                    }
                }, 100);
            }
            document.getElementById('stat-toplam').innerText = stats.toplam;
            document.getElementById('stat-mekanik').innerText = stats.mekanik;
            document.getElementById('stat-elektrik').innerText = stats.elektrik;
            document.getElementById('stat-isg').innerText = stats.isg;
            document.getElementById('stat-tekrar').innerText = stats.tekrar;
            document.getElementById('stat-bakim').innerText = stats.bakim;
            document.getElementById('stat-diger').innerText = stats.diger;
        }

        let isUpdating = false;
        let refreshSeconds = 15;

        function yukle() {
            if (isUpdating) return;
            refreshSeconds = 15;
            isUpdating = true;
            if (typeof google !== 'undefined') {
                google.script.run.withSuccessHandler((res) => { tumPaneliCiz(res); isUpdating = false; }).withFailureHandler(() => { isUpdating = false; }).veriAl();
            } else { isUpdating = false; }
        }

        window.onload = () => {
            const sf = localStorage.getItem('userFontSize'); if (sf) { setFontSize(sf); const s = document.getElementById('font-size-select'); if (s) s.value = sf; }
            const slf = localStorage.getItem('userListFontSize'); if (slf) { setListFontSize(slf); const s = document.getElementById('list-font-size-select'); if (s) s.value = slf; }
            yukle();
            setInterval(yukle, 15000);
            setInterval(() => {
                refreshSeconds--; if (refreshSeconds < 0) refreshSeconds = 15;
                const t = document.getElementById('refresh-timer'); if (t) t.innerText = refreshSeconds;
                checkManualRefresh();
            }, 1000);

            const sysMon = document.getElementById('system-monitor');
            let f = 0, lt = performance.now();
            function mon() {
                f++; let n = performance.now();
                if (n - lt >= 1000) {
                    let fps = f, ram = performance.memory ? Math.round(performance.memory.usedJSHeapSize / 1048576) + "MB" : "--";
                    if (sysMon) sysMon.innerText = `FPS: ${fps} | RAM: ${ram}`;
                    f = 0; lt = n;
                }
                requestAnimationFrame(mon);
            }
            mon();
            try { if ('wakeLock' in navigator) requestWakeLock(); } catch (e) { }
        };
    </script>
</body>

</html>
