<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakım HUB | Kesintisiz İzleme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-[#0f172a] text-slate-100">

    <nav class="border-b border-slate-800 bg-[#1e293b]/90 backdrop-blur sticky top-0 z-50 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 text-red-500">
                <span class="material-icons animate-pulse">warning</span>
                <span class="font-bold text-xl tracking-tight text-white uppercase italic">Aktif<span class="text-blue-500 font-black">ARIZALAR</span></span>
            </div>
            <div class="bg-slate-900/50 px-3 py-1.5 rounded-full border border-slate-700 flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase">
                <span class="h-2 w-2 rounded-full bg-green-500"></span> HUB CANLI
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 py-8">
        <div id="data-list" class="grid gap-4 text-center py-20 text-slate-500 font-mono text-xs tracking-widest">
            SİSTEM TARANIYOR...
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSiAuiO1cWDZLOtuFdAkBOU1PNf5mpThgH3yKaL5NHpj0QDrJmpt7XbRuCnQejkxf89oQ_uu1zO-2/pub?gid=0&single=true&output=csv';

        function fetchData() {
            Papa.parse(CSV_URL, {
                download: true,
                header: false, // SÜTUN İSİMLERİNE BAKMA, SIRALAMAYA BAK
                skipEmptyLines: true,
                complete: function(results) {
                    processRows(results.data);
                }
            });
        }

        function processRows(rows) {
            const list = document.getElementById('data-list');
            list.innerHTML = "";
            
            // İlk satır başlıktır, onu atla
            const dataRows = rows.slice(1);
            
            // FİLTRE: P sütununda (15. index) veri olan ve R sütununda (17. index) veri olmayanlar
            // Not: JS'de sayma 0'dan başlar. P=15, R=17
            const activeTasks = dataRows.filter(row => {
                const makineAdi = row[15]; // P Sütunu
                const bakimiYapan = row[17]; // R Sütunu (Bakımı Yapan-1)
                
                return makineAdi && makineAdi.trim() !== "" && (!bakimiYapan || bakimiYapan.trim() === "");
            });

            if (activeTasks.length === 0) {
                list.innerHTML = `<div class="py-20 opacity-30 uppercase font-black tracking-widest italic">Açık Arıza Kaydı Yok</div>`;
                return;
            }

            activeTasks.reverse().forEach(row => {
                const tarih = row[0];   // A Sütunu
                const acan = row[2];    // C Sütunu
                const bolum = row[4];   // E Sütunu
                const tur = row[8];     // I Sütunu (Arıza Türü)
                const aciklama = row[10]; // K Sütunu
                const makine = row[15];  // P Sütunu
                
                const isUrgent = tur.toLowerCase().includes("elektrik") || tur.toLowerCase().includes("mekanik");

                list.innerHTML += `
                    <div class="bg-[#1e293b] p-5 rounded-2xl border border-slate-700 flex justify-between items-center shadow-2xl border-l-4 ${isUrgent ? 'border-l-red-500' : 'border-l-blue-500'}">
                        <div class="flex-1 pr-4">
                            <div class="flex items-center gap-2 mb-1">
                                <h3 class="font-black text-lg text-white">${makine}</h3>
                                <span class="text-[9px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded font-black border border-slate-700 uppercase">${bolum}</span>
                            </div>
                            <p class="text-[11px] text-slate-400 font-medium">${aciklama}</p>
                            <div class="flex items-center gap-3 mt-4 text-[9px] text-slate-500 font-bold
