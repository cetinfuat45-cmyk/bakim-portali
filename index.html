<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakım HUB Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg-dark: #020617;
            --bg-grid: #0f172a;
            --header-black: #000000;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --mekanik: #38bdf8;
            --elektrik: #facc15;
            --planli: #fb923c;
            --is: #22d3ee;
            --isg: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            cursor: default;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-size: 11px;
        }

        .top-bar {
            height: 24px;
            background: var(--header-black);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 12px;
            border-bottom: 1px solid #1e293b;
        }

        .stat-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .stat-btn span:last-child {
            background: #1e293b;
            padding: 0 4px;
            border-radius: 3px;
            color: #fff;
            font-size: 9px;
        }

        .stat-btn .material-icons {
            font-size: 10px;
        }

        .section-header {
            padding: 5px 10px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--isg);
            border-bottom: 1px solid #ef4444;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 10px;
            padding: 10px;
            background: var(--bg-dark);
        }

        .card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--c);
            padding: 10px;
            border-radius: 6px;
            height: 160px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .card .c-title {
            font-size: 10px;
            font-weight: 800;
            color: var(--c);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
        }

        .card .c-name {
            font-size: 16px;
            font-weight: 800;
            margin: 6px 0;
            color: #fff;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .card .c-sub {
            font-size: 10px;
            color: var(--text-main);
            margin-bottom: 6px;
            background: rgba(0, 0, 0, 0.4);
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            font-weight: 700;
        }

        .card .c-desc {
            font-size: 12px;
            color: #4ade80;
            line-height: 1.4;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .card .c-foot {
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 6px;
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: #94a3b8;
            font-weight: 600;
        }

        .list-view {
            padding: 5px 10px;
        }

        .list-row {
            display: grid;
            grid-template-columns: 80px 100px 120px 110px 1fr 100px;
            gap: 8px;
            padding: 2px 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            align-items: center;
        }

        .list-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .r-type {
            font-weight: 800;
            font-size: 8px;
            text-align: center;
            color: var(--c);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2px;
            padding: 1px 0;
        }

        .r-val {
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            color: #94a3b8;
            font-size: 10px;
        }

        .group-sep {
            border-bottom: 2px solid var(--c);
            padding: 3px 10px;
            font-size: 9px;
            font-weight: 800;
            color: var(--c);
            margin-top: 10px;
            text-transform: uppercase;
        }

        .c-mekanik {
            --c: var(--mekanik);
        }

        .c-elektrik {
            --c: var(--elektrik);
        }

        .c-planli {
            --c: var(--planli);
        }

        .c-is {
            --c: var(--is);
        }

        .c-isg {
            --c: var(--isg);
        }

        .c-other {
            --c: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <div class="stat-btn">TOPLAM <span id="s-total">0</span></div>
        <div class="stat-btn" style="color:var(--mekanik)"><span class="material-icons">settings</span> MEK <span
                id="s-mek">0</span></div>
        <div class="stat-btn" style="color:var(--elektrik)"><span class="material-icons">bolt</span> ELEK <span
                id="s-elek">0</span></div>
        <div class="stat-btn" style="color:var(--isg)"><span class="material-icons">gpp_maybe</span> İSG <span
                id="s-isg">0</span></div>
        <div class="stat-btn"><span class="material-icons">history</span> TEKRAR <span id="s-tek">0</span></div>
        <div class="stat-btn" style="color:var(--planli)"><span class="material-icons">event_note</span> P.BAKIM <span
                id="s-plan">0</span></div>
    </div>

    <div class="section-header" style="color:var(--is)">BUGÜNÜN ARIZALARI</div>
    <div id="grid-view" class="grid-view"></div>

    <div class="section-header">ESKİ BEKLEYEN KAYITLAR</div>
    <div id="list-view" class="list-view"></div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSiAuiO1cWDZLOtuFdAkBOU1PNf5mpThgH3yKalH5NHpj0QDrJmpt7XbRuCnQejkxF89oQ_uu1zO-2/pub?gid=0&single=true&output=csv';

        function getTypeInfo(tur) {
            tur = tur.toUpperCase();
            if (tur.includes("MEKANİK")) return { c: "c-mekanik", label: "MEKANİK ARIZA", icon: "settings" };
            if (tur.includes("ELEKTRİK")) return { c: "c-elektrik", label: "ELEKTRİK ARIZA", icon: "bolt" };
            if (tur.includes("PLANLI")) return { c: "c-planli", label: "PLANLI BAKIM KODU", icon: "event_note" };
            if (tur.includes("YAPILAN")) return { c: "c-is", label: "YAPILAN İŞ HAKKINDA", icon: "task_alt" };
            if (tur.includes("İSG") || tur.includes("GÜVENLİ")) return { c: "c-isg", label: "İSG GÜVENLİĞİ", icon: "gpp_maybe" };
            return { c: "c-other", label: tur, icon: "info" };
        }

        function processData(rows) {
            const dataRows = rows.slice(1);
            const grid = document.getElementById('grid-view');
            const list = document.getElementById('list-view');
            const today = new Date().toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });

            let counts = { total: 0, mek: 0, elek: 0, isg: 0, plan: 0 };
            let todayTasks = [];
            let gridHtml = "";
            let groups = { isg: [], mekanik: [], elektrik: [], planli: [], is: [], other: [] };

            dataRows.forEach(row => {
                const rawDate = row[0] || "";
                const datePart = rawDate.split(' ')[0] || "";
                const timePart = rawDate.split(' ')[1] || "";
                const acan = row[2] || "-";
                const bolum = row[4] || "-";
                const tur = (row[8] || "DİĞER").toUpperCase();
                const desc = row[10] || "-";
                const tech = row[14] || "-";
                const machine = (row[15] || "").trim();
                const finished = (row[20] || "").trim();

                if (finished === "" && rawDate !== "" && desc !== "-") {
                    counts.total++;
                    const info = getTypeInfo(tur);
                    const name = (machine === "" || machine.startsWith('#')) ? bolum : machine;
                    const isNew = (machine === "" || machine.startsWith('#'));

                    // BUGÜNÜN ARIZALARI + P-Z BOŞSA -> KART (GRID)
                    if (datePart === today && isNew) {
                        if (tur.includes("MEKANİK")) counts.mek++;
                        else if (tur.includes("ELEKTRİK")) counts.elek++;
                        else if (tur.includes("İSG")) counts.isg++;
                        else if (tur.includes("PLANLI")) counts.plan++;

                        todayTasks.push({ info, name, tech, timePart, desc, acan, datePart });
                    } 
                    // ESKİ ARIZALAR VEYA P-Z DOLU OLANLAR -> TABLO (LİSTE)
                    else {
                        const rowHtml = `
                            <div class="list-row">
                                <div class="r-val" style="color:var(--text-dim)">${datePart} ${timePart}</div>
                                <div class="r-val" style="color:#fff; font-weight:800">${acan}</div>
                                <div class="r-val" style="color:var(--mekanik)">${name}</div>
                                <div class="r-type ${info.c}">${info.label}</div>
                                <div class="r-val" style="color:#4ade80; font-weight:600">${desc}</div>
                                <div class="r-val" style="text-align:right; color:var(--mekanik); font-weight:800">${tech}</div>
                            </div>`;

                        if (tur.includes("İSG") || tur.includes("GÜVENLİ")) groups.isg.push(rowHtml);
                        else if (tur.includes("MEKANİK")) groups.mekanik.push(rowHtml);
                        else if (tur.includes("ELEKTRİK")) groups.elektrik.push(rowHtml);
                        else if (tur.includes("PLANLI")) groups.planli.push(rowHtml);
                        else if (tur.includes("YAPILAN")) groups.is.push(rowHtml);
                        else groups.other.push(rowHtml);
                    }
                }
            });

            // Bugünün görevlerini EN YENİ EN BAŞTA olacak şekilde ters çevirip bas
            todayTasks.reverse().forEach(t => {
                gridHtml += `
                    <div class="card ${t.info.c}">
                        <div class="c-title">${t.info.label} <span class="material-icons">${t.info.icon}</span></div>
                        <div class="c-name">${t.name}</div>
                        <div class="c-sub">${t.tech} / ${t.timePart}</div>
                        <div class="c-desc">${t.desc}</div>
                        <div class="c-foot">
                            <span>${t.acan}</span>
                            <span>${t.datePart}</span>
                        </div>
                    </div>`;
            });

            document.getElementById('s-total').innerText = counts.total;
            document.getElementById('s-mek').innerText = counts.mek;
            document.getElementById('s-elek').innerText = counts.elek;
            document.getElementById('s-isg').innerText = counts.isg;
            document.getElementById('s-plan').innerText = counts.plan;

            grid.innerHTML = gridHtml || '<div style="color:var(--text-dim); padding:10px">Bugün henüz bir kayıt girilmedi.</div>';

            let listHtml = "";
            const renderGroup = (title, items, colorVar) => {
                if (items.length === 0) return "";
                return `<div class="group-sep" style="--c: var(${colorVar})">${title}</div>${items.join('')}`;
            };

            listHtml += renderGroup("İSG GÜVENLİĞİ", groups.isg, "--isg");
            listHtml += renderGroup("MEKANİK ARIZA", groups.mekanik, "--mekanik");
            listHtml += renderGroup("ELEKTRİK ARIZA", groups.elektrik, "--elektrik");
            listHtml += renderGroup("PLANLI BAKIM KODU", groups.planli, "--planli");
            listHtml += renderGroup("YAPILAN İŞ HAKKINDA", groups.is, "--is");
            listHtml += renderGroup("DİĞER KAYITLAR", groups.other, "--text-dim");

            list.innerHTML = listHtml || '<div style="color:var(--text-dim); padding:10px">Eski bekleyen kayıt bulunmuyor.</div>';
        }

        function fetchData() {
            const url = CSV_URL + '&t=' + new Date().getTime();
            Papa.parse(url, {
                download: true, header: false, skipEmptyLines: true,
                complete: function (res) { processData(res.data); }
            });
        }

        window.onload = fetchData;
        setInterval(fetchData, 10000);
    </script>
</body>

</html>
