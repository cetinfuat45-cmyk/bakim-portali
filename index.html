<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB.CORE Bakım Portalı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100">

    <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="material-icons text-blue-500">analytics</span>
                <span class="font-bold text-xl">BAKIM<span class="text-blue-500 text-xs">HUB</span></span>
            </div>
            <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded">CANLI SİSTEM</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 py-8">
        <div id="data-list" class="grid gap-4">
            <p class="text-center text-slate-500 animate-pulse">Veri bağlantısı kuruluyor...</p>
        </div>
    </main>

    <script>
        // ÖNEMLİ: Kendi Google Sheets CSV linkini tırnak içine koy
        const CSV_LINK = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSiAuiO1cWDZLOtuFdAkBOU1PNf5mpThgH3yKalH5NHpj0QDrJmpt7XbRuCnQejkxF89oQ_uu1zO-2/pub?output=csv';

        function loadData() {
            Papa.parse(CSV_LINK, {
                download: true,
                header: true,
                complete: function(results) {
                    renderCards(results.data);
                }
            });
        }

        function renderCards(data) {
            const list = document.getElementById('data-list');
            list.innerHTML = "";
            data.forEach(item => {
                if(!item.Makine) return;
                const isError = item.Durum?.toLowerCase().includes("arıza");
                list.innerHTML += `
                    <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg">${item.Makine}</h3>
                            <p class="text-sm text-slate-400">${item.Bölüm || 'Genel Bakım'}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold ${isError ? 'bg-red-500/20 text-red-500 border border-red-500' : 'bg-green-500/20 text-green-500 border border-green-500'}">
                            ${item.Durum || 'Belirsiz'}
                        </span>
                    </div>
                `;
            });
        }
        window.onload = loadData;
        setInterval(loadData, 30000);
    </script>
</body>
</html>
