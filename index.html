        /* --- CARD STYLE (High Res - Optimized) --- */
        .job-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 12px;

            gap: 4px;
            position: relative;
            min-height: var(--card-min-height, 40px);
            font-size: var(--card-font-size);

        }

        .job-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        .size-s {

        }

            max-width: 650px;
        }

            width: auto;
            max-width: 100%;
        }

        .job-card {

        .list-container {

        /* @keyframes scroll-vertical removed */

        /* --- HORIZONTAL MARQUEE REMOVED --- */

        @keyframes scroll-pingpong {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(calc(-100% + 300px));
            }

            /* Just a guess, JS better handles this */
            100% {
                transform: translateY(0);
            }
        }

        .list-header {
            font-size: 1.2em;
            color: var(--text-secondary);
            margin-bottom: 5px;
            text-transform: uppercase;

        }

        .group-block {
            display: flex;

            padding: 2px 10px;

            color: var(--group-color, #fff);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            border-bottom: 2px solid var(--group-color);
            margin-top: 0;

            display: grid;
            grid-template-columns: 110px 120px 50px 120px 110px 1fr 120px;
            align-items: center;
            gap: 4px;

            border-bottom: 1px solid rgba(255, 255, 255, 0.1);

        /* Last row shouldn't have bottom border in a block usually, but strictly speaking for table look it's fine or we can remove it */
        .group-block .old-job-row:last-child {

        }

        .group-table-header {

            // Start Countdown
            bildirimCountdownInterval = setInterval(() => {
                remainingTime--;

        // --- DATA RENDERING ---
        let lastDataString = "";

        function tumPaneliCiz(res) {
            if (!res || !res.tablo2) return;

            // Performance: Check if data actually changed
            const currentDataString = JSON.stringify(res.tablo2) + (res.operatorler ? JSON.stringify(res.operatorler) : "");

            // ANDROID TV OPTIMIZATION: Prevent unnecessary DOM updates
            if (currentDataString === lastDataString) {
                // console.log("Data unchanged, skipping render.");
                return;

            lastDataString = currentDataString;

            // Render Operator Stats to Footer
            const operatorContainer = document.getElementById('footer-ops');
            if (operatorContainer && res.operatorler && Array.isArray(res.operatorler)) {
                // Determine Current Shift Column (A:0, B:1, C:2)
                const trNormalize = (str, isComparison = false) => {
                    if (!str) return "";
                    let s = str.toString().trim()
                        .replace(/İ/g, 'I').replace(/ı/g, 'i')
                        .replace(/Ğ/g, 'G').replace(/ğ/g, 'g')
                        .replace(/Ü/g, 'U').replace(/ü/g, 'u')
                        .replace(/Ş/g, 'S').replace(/ş/g, 's')
                        .replace(/Ö/g, 'O').replace(/ö/g, 'o')
                        .replace(/Ç/g, 'C').replace(/ç/g, 'c')
                        .toUpperCase();
                    if (isComparison) s = s.replace(/[^A-Z0-9]/g, "");
                    return s;
                };




                // --- NEW OPERATOR & SHIFT LOGIC ---
                // 1. Parse Operators (Row 1: Names, Row 2: Scores)
                const opNames = res.operatorler && res.operatorler.length > 0 ? res.operatorler[0] : [];
                const opScores = res.operatorler && res.operatorler.length > 1 ? res.operatorler[1] : [];

                // 2. Determine Current Shift (08-16, 16-00, 00-08)
                const hour = new Date().getHours();
                // Shift Mapping based on columns I, J, K (Indices 0, 1, 2 in vardiyalar)
                // Assuming I=08:00-16:00, J=16:00-00:00, K=00:00-08:00
                // We verify headers to be sure

                let activeColIndex = -1;

                if (res.vardiyalar && res.vardiyalar.length > 0) {
                    const headers = res.vardiyalar[0]; // Row 1 headers (e.g., 08:00 // 16:00)

                    // Logic to find column based on hour
                    // 08-16 -> Match "08" or "16" in first part
                    // 16-00 -> Match "16" or "00"
                    // 00-08 -> Match "00" or "08"

                    // Simple index fallback if headers are standard:
                    if (hour >= 8 && hour < 16) activeColIndex = 0;      // 08-16
                    else if (hour >= 16 && hour < 24) activeColIndex = 1; // 16-24
                    else activeColIndex = 2;                              // 24-08
                }

                // 3. Render All Shifts (Grouped)
                let html = "";
                const colors = ['#0ea5e9', '#22c55e', '#eab308', '#f97316', '#ef4444', '#a855f7', '#ec4899', '#6366f1'];

                                if (name && name.toString().trim() !== "") {
                                    groupOps.push(trNormalize(name, true));
                                }
                            }
                        }
                    }

                    if (groupOps.length === 0) return; // Skip empty groups

                    const isCurrentShift = (group.colIndex === activeColIndex);
                    const opacity = isCurrentShift ? "1" : "0.5";
                    const grayscale = isCurrentShift ? "0" : "1";

                        // Styling

            // Alarm Logic Removed

            // Clear containers explicitly before rebuilding
            gridContainer.innerHTML = "";
            listContainer.innerHTML = "";

            let gridHtml = "";
            let listHtml = "";

            // Grouping Buckets
            const groups = {
                'mekanik': { label: 'MEKANİK ARIZA', color: 'var(--color-mekanik)', items: [] },
                'elektrik': { label: 'ELEKTRİK ARIZA', color: 'var(--color-elektrik)', items: [] },
                'isg': { label: 'İŞ GÜVENLİĞİ !!!', color: 'var(--color-isg)', items: [] },
                'tekrar': { label: 'TEKRAR EDEN ARIZA !!!!', color: 'var(--color-tekrar)', items: [] },
                'bakim': { label: 'PLANLI BAKIM KODU', color: 'var(--color-bakim)', items: [] },
                'sikayet': { label: 'ŞİKAYET VEYA ÖNERİ', color: 'var(--color-sikayet)', items: [] },
                'diger': { label: 'DİĞER İŞLER', color: 'var(--color-diger)', items: [] }
            };

            // Today Date
            const today = new Date();
            const dd = String(today.getDate()).padStart(2, '0');
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const yyyy = today.getFullYear();
            const todayStr = `${dd}.${mm}.${yyyy}`;

            let hasTodayItems = false;
            let hasOlderItems = false;

            // Latest First & Limit to 150 items for Performance
            const reversedData = [...dataRows].reverse().slice(0, 150);

            reversedData.forEach((row, index) => {
                const isFirst = index === 0;
                const featuredClass = isFirst ? 'featured-card' : '';

                const rDateFull = row[0] || "";
                const rDate = rDateFull.substring(0, 16); // Include HH:MM
                const rReq = row[1] || ""; // (B) İŞ İSTEK AÇAN
                const rShift = row[2] || ""; // (C) VARDIYA
                const rType = (row[3] || "").toString().toUpperCase(); // (D) İŞ TÜRÜ
                const rDesc = row[4] || ""; // (E) AÇIKLAMA
                const rMach = row[5] || ""; // (F) İŞ İSTEK MAKİNE
                const rWorker = row[6] || ""; // (G) GÖREVLİ

                // Determine Style Class & Stats
                let borderClass = 'status-diger';
                let targetGroup = 'diger';

                if (rType.includes('MEKANİK')) { borderClass = 'status-mekanik'; stats.mekanik++; targetGroup = 'mekanik'; }
                else if (rType.includes('ELEKTRİK')) { borderClass = 'status-elektrik'; stats.elektrik++; targetGroup = 'elektrik'; }
                else if (rType.includes('GÜVENLİ') || rType.includes('İSG')) { borderClass = 'status-isg'; stats.isg++; targetGroup = 'isg'; }
                else if (rType.includes('TEKRAR') || rType.includes('REPEATED')) { borderClass = 'status-tekrar'; stats.tekrar++; targetGroup = 'tekrar'; }
                else if (rType.includes('PLANLI') || rType.includes('BAKIM')) { borderClass = 'status-bakim'; stats.bakim++; targetGroup = 'bakim'; }
                else if (rType.includes('ŞİKAYET') || rType.includes('ÖNERİ')) { borderClass = 'status-sikayet'; stats.sikayet++; targetGroup = 'sikayet'; }
                else { stats.diger++; targetGroup = 'diger'; }

                if (rDate.substring(0, 10) === todayStr) { // Compare only date part
                    hasTodayItems = true;

                    // Get Group Color
                    const grpColor = groups[targetGroup].color;

                    // Format Operator Name (First Initial + Dot + Last Name)
                    let formattedReq = rReq;
                    if (rReq && rReq.trim().length > 0) {
                        const parts = rReq.trim().split(/\s+/);
                        if (parts.length > 1) {
                            // Example: "ATAKAN AYHAN" -> "A.AYHAN"
                            formattedReq = parts[0].charAt(0) + '.' + parts[parts.length - 1];
                        }
                    }


                    // --- DYNAMIC FONT & CARD SIZE LOGIC ---
                    // Karakter sayısına göre Kart Boyutu (S, M, L) ve Font ayarı

                    const len = rDesc.length;
                    let sizeClass = "size-s"; // Default small
                    let dynamicStyle = "";
                    let clampStyle = "-webkit-line-clamp: 4; line-clamp: 4;"; // Default 4 lines

                    if (len > 150) {
                        sizeClass = "size-l";
                        clampStyle = "-webkit-line-clamp: 8; line-clamp: 8;";
                    } else if (len > 60) {
                        sizeClass = "size-m";
                        clampStyle = "-webkit-line-clamp: 6; line-clamp: 6;";
                    }

                    // Çok uzun yazılarda fontu hafif küçült (Sığdırmak için)
                    if (len > 250) dynamicStyle = "font-size: 0.9em;";

                    // ----------------------------------

                    gridHtml += `
                        <div class="job-card ${borderClass} ${sizeClass} ${featuredClass}">
                            <div class="card-header-line">
                                <div class="job-group-header" style="color:${grpColor}">${rType}</div>
                                <div class="job-time">${rDate.substring(11, 16)}</div>
                            </div>
                            <div class="requester-name">${formattedReq || '-'}</div>
                            
                            <!-- Machine & Shift Details -->
                            ${(rMach || rShift) ? `
                            <div style="display:flex; justify-content:space-between; font-size:0.85em; color:var(--text-secondary); margin-top:4px; padding-bottom:4px; border-bottom:1px solid rgba(255,255,255,0.1);">
                                <span style="color:${grpColor}">${rMach}</span>
                                <span>${rShift ? ' / ' + rShift : ''}</span>
                            </div>` : ''}
                            
                            ${rWorker ? `<div style="font-size:0.9em; color:var(--accent-yellow); font-weight:bold; margin-top:4px;">Görevli: ${rWorker}</div>` : ''}
                            
                            <div class="job-desc" title="${rDesc}" style="margin-top:8px; ${dynamicStyle} ${clampStyle}">${rDesc}</div>
                        </div>
                    `;

                } else {
                    hasOlderItems = true;
                    // Add to Group Bucket with ALL info
                    groups[targetGroup].items.push({
                        date: rDate,
                        req: rReq,
                        shift: rShift,
                        type: rType,
                        desc: rDesc,
                        mach: rMach,
                        worker: rWorker,
                        cls: borderClass
                    });
                }
            });

            gridContainer.innerHTML = gridHtml;

            // Build List HTML with Groups
            if (hasOlderItems) {
                let innerList = "";
                const groupOrder = ['isg', 'mekanik', 'elektrik', 'tekrar', 'bakim', 'sikayet', 'diger'];

                groupOrder.forEach(key => {
                    const grp = groups[key];
                    if (grp.items.length > 0) {
                        innerList += `
                            <div class="group-block" style="--group-color:${grp.color}">
                                <div class="group-header">
                                    ${grp.label} <span class="group-count">${grp.items.length}</span>
                                </div>
                                <!-- Column Headers Removed -->
                        `;
                        grp.items.forEach(item => {
                            // Strict Grid Columns: Date | Req | Shift | Machine | Type | Desc | Worker

                            // 1. Date
                            // 2. Requester (Default: -)
                            const cellReq = item.req ? `<div class="row-requester" title="${item.req}">${item.req}</div>` : `<div class="row-requester">-</div>`;
                            // 3. Shift (Default: -)
                            const cellShift = item.shift ? `<div class="row-shift" title="${item.shift}">${item.shift}</div>` : `<div class="row-shift">-</div>`;
                            // 4. Machine (Default: -)
                            const cellMach = item.mach ? `<div class="row-machine-name" title="${item.mach}">${item.mach}</div>` : `<div class="row-machine-name">-</div>`;
                            // 5. Type (Always present)
                            // 6. Desc (Always present)
                            // 7. Worker (Default: -)
                            const cellWorker = item.worker ? `<div class="row-worker" title="${item.worker}">${item.worker}</div>` : `<div class="row-worker">-</div>`;

                            innerList += `
                                <div class="old-job-row ${item.cls}">
                                    <div class="row-date">${item.date}</div>
                                    ${cellReq}
                                    ${cellShift}
                                    ${cellMach}
                                    <div class="row-type">${item.type}</div>
                                    <div class="row-desc" title="${item.desc}">${item.desc}</div>
                                    ${cellWorker}
                                </div>
                            `;
                        });
                        innerList += `</div>`; // Close group-block
                    }
                });

                // Create Scroll Wrapper
                // Use two copies for seamless loop if needed, or just one for ping-pong
                listContainer.innerHTML = `<div class="scroll-wrapper" id="scroll-content">${innerList}</div>`;
                listContainer.style.display = 'flex';

                // --- ANIMATION LOGIC (Optimized) ---
                // Wait for render to calculate height
                setTimeout(() => {
                    const wrapper = document.getElementById('scroll-content');
                    if (wrapper) {
                        const containerHeight = listContainer.clientHeight;
                        const contentHeight = wrapper.scrollHeight;

                        if (contentHeight > containerHeight) {
                            const distance = contentHeight - containerHeight;
                            const duration = distance / 20; // Speed: 20px/sec roughly

                            // Optimized: Use CSS Variables instead of creating new keyframes
                            // We need a reusable keyframe in CSS that uses a variable
                            // Check if global style exists, if not add it ONCE
                            if (!document.getElementById('optimized-scroll-style')) {
                                const style = document.createElement('style');
                                style.id = 'optimized-scroll-style';
                                style.textContent = `
                                    @keyframes optimizedScroll {
                                        0% { transform: translateY(0); }
                                        50% { transform: translateY(var(--scroll-dist)); }
                                        100% { transform: translateY(0); }
                                    }
                                `;
                                document.head.appendChild(style);
                            }

                            // Update the variable on the wrapper
                            wrapper.style.setProperty('--scroll-dist', `-${distance}px`);

                            // Reset animation to force restart if needed, or just let it run
                            // For smooth updates, we might need to be careful.
                            // If duration changes significantly, we update it.
                            wrapper.style.animation = `optimizedScroll ${duration * 2}s ease-in-out infinite`;

                        } else {
                            wrapper.style.animation = 'none';
                        }
                    }
                }, 100);

            } else {
                listContainer.style.display = 'none';
            }

            // Update Stats Display (Same as before)
            document.getElementById('stat-toplam').innerText = stats.toplam;
            document.getElementById('stat-mekanik').innerText = stats.mekanik;
            document.getElementById('stat-elektrik').innerText = stats.elektrik;

            // ... (rest of stats logic) ...
            const isgStat = document.getElementById('stat-isg');
            isgStat.innerText = stats.isg;
            if (stats.isg > 0) {
                // isgStat.parentElement.classList.add('neon-alert-text'); // Class removed
                isgStat.parentElement.style.color = '#ff0000';
            } else {
                // isgStat.parentElement.classList.remove('neon-alert-text');
                isgStat.parentElement.style.color = '#22c55e';
            }

            document.getElementById('stat-tekrar').innerText = stats.tekrar;
            document.getElementById('stat-bakim').innerText = stats.bakim;
            document.getElementById('stat-diger').innerText = stats.diger;

        }

        let isUpdating = false;
        let refreshSeconds = 15;

        function yukle() {
            console.log("Veri yükleniyor... " + new Date().toLocaleTimeString());
            if (isUpdating) return; // Prevent stacking requests

            // Reset Countdown
            refreshSeconds = 15;
            const timerEl = document.getElementById('refresh-timer');
            if (timerEl) timerEl.innerText = "15";

            isUpdating = true;

            if (typeof google !== 'undefined') {
                google.script.run
                    .withSuccessHandler((res) => {
                        tumPaneliCiz(res);
                        isUpdating = false;
                    })
                    .withFailureHandler((err) => {
                        console.error("Data Fetch Error:", err);
                        isUpdating = false;
                        // Retry handled by next interval, no need for recursive setTimeout
                    })
                    .veriAl();
            } else {
                // ... mock data logic ...
                isUpdating = false;
            }
        }

        // Init
        window.onload = () => {
            // critical threshold logic removed

            // Load Card Font Size
            // Font logic removed from UI, but function exists. 
            // If elements missing, setFontSize might fail if it relies on UI selection?
            // setFontSize uses css variables, so it is safe.
            // But getting value from select element needs check.
            const savedFont = localStorage.getItem('userFontSize');
            if (savedFont) {
                const select = document.getElementById('font-size-select');
                if (select) select.value = savedFont;
                setFontSize(savedFont);
            }

            // Load List Font Size
            // List Font Size
            const savedListFont = localStorage.getItem('userListFontSize');
            if (savedListFont) {
                setListFontSize(savedListFont);
                const listSelect = document.getElementById('list-font-size-select');
                if (listSelect) listSelect.value = savedListFont;
            } else {
                setListFontSize(7); // Default to 7px for TV
            }

            // Reset body zoom just in case a previous version set it
            if ('zoom' in document.body.style) document.body.style.zoom = "1";

            // Load App Scale
            const savedScale = localStorage.getItem('appScale');
            if (savedScale) {
                const scaleSelect = document.getElementById('app-scale-select');
                if (scaleSelect) scaleSelect.value = savedScale;
                setAppScale(savedScale);
            } else {
                setAppScale(0.85); // Default to 85% for TV content
            }

            yukle();

            // Countdown & Auto-Refresh Logic (Unified)
            setInterval(() => {
                refreshSeconds--;
                if (refreshSeconds <= 0) {
                    yukle();
                }
                const timerEl = document.getElementById('refresh-timer');
                if (timerEl) timerEl.innerText = refreshSeconds;
            }, 1000);

            // --- SYSTEM MONITOR (FPS & RAM) ---
            const sysMon = document.getElementById('system-monitor');
            let frameCount = 0;
            let lastTime = performance.now();

            function updateMonitor() {
                const now = performance.now();
                frameCount++;

                if (now - lastTime >= 1000) {
                    const fps = frameCount;
                    frameCount = 0;
                    lastTime = now;

                    let ramUsage = "--";
                    if (performance.memory) {
                        // usedJSHeapSize is in bytes, convert to MB
                        ramUsage = Math.round(performance.memory.usedJSHeapSize / 1048576) + "MB";
                    }

                    if (sysMon) sysMon.innerText = `FPS: ${fps} | RAM: ${ramUsage}`;
                }
                requestAnimationFrame(updateMonitor);
            }
            requestAnimationFrame(updateMonitor);

            try {
                if ('wakeLock' in navigator) {
                    requestWakeLock();
                }
            } catch (e) { console.log("Wake Lock not supported"); }
        };
    </script>
</body>
